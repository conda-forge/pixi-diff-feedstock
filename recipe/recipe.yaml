context:
  name: pixi-diff
  version: "0.1.6"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/pavelzw/${{ name }}/archive/v${{ version }}.tar.gz
  sha256: 4b6c0b3daeb5cfe05283a15ac565f3a7ccea5a63ff7d1035f041705fe9929130

build:
  number: 1
  script:
    env:
      # Use cmake to build aws-lc-sys, because conda's CFLAGS inject -O2 which
      # overrides the -O0 required by jitterentropy-base.c, causing a build failure.
      AWS_LC_SYS_CMAKE_BUILDER: "1"
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          # path too long for pixi_core subpackage, https://github.com/prefix-dev/pixi/issues/3691
          - set CARGO_HOME=C:\.cargo
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - cmake
    - make

tests:
  - script:
      - pixi-diff --version
  - package_contents:
      bin:
        - pixi-diff
      strict: true

about:
  homepage: https://github.com/pavelzw/pixi-diff
  summary: Generate JSON diffs between pixi lockfiles
  description: |
    A simple executable to generate a JSON diff (similar to `pixi update --json`) between two pixi lockfiles.
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/pavelzw/pixi-diff

extra:
  recipe-maintainers:
    - pavelzw
