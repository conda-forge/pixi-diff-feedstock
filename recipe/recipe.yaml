context:
  name: pixi-diff
  version: "0.1.5"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/pavelzw/${{ name }}/archive/v${{ version }}.tar.gz
  sha256: 563ad27ca62cea1262608d0dc9d475787dc82dbe03c2e6d538aa23ae23ef1d24

build:
  number: 1
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - pixi-diff --version
  - package_contents:
      bin:
        - pixi-diff
      strict: true

about:
  homepage: https://github.com/pavelzw/pixi-diff
  summary: Generate JSON diffs between pixi lockfiles
  description: |
    A simple executable to generate a JSON diff (similar to `pixi update --json`) between two pixi lockfiles.
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/pavelzw/pixi-diff

extra:
  recipe-maintainers:
    - pavelzw
